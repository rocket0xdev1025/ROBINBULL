<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Soft glow -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="arrowFill" x1="8" y1="4" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14"/>
      <stop offset="0.45" stop-color="#00C805"/>
      <stop offset="1" stop-color="#F5C518"/>
    </linearGradient>
  </defs>
  <!-- Classic pointer arrow with forest gold-green -->
  <path
    filter="url(#glow)"
    d="M8 4 L8 38 L16.5 29.5 L24 44 L29 41.5 L21.5 27 L34 27 Z"
    fill="url(#arrowFill)"
    stroke="#0a1f0a"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Inner highlight -->
  <path
    d="M11 10 L11 30 L16 25 L22.5 37 L25 35.5 L18.5 24 L28 24 Z"
    fill="#ffffff"
    opacity="0.22"
  />
</svg>
